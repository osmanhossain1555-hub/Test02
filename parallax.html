<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Parallax — Depth from a Single Photo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0c;
    --ink: #f4f1e8;
    --dim: #6b6960;
    --accent: #ff5722;
    --accent-soft: #ffb29a;
    --line: rgba(244, 241, 232, 0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Fraunces', serif;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  body {
    background-image:
      radial-gradient(circle at 20% 0%, rgba(255, 87, 34, 0.08), transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(255, 178, 154, 0.05), transparent 50%);
  }

  .app {
    position: relative;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 20px 24px 12px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px solid var(--line);
  }

  .logo {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 22px;
    letter-spacing: -0.02em;
  }

  .logo em {
    font-style: italic;
    color: var(--accent-soft);
    font-weight: 300;
  }

  .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* Stage where the magic happens */
  .stage {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #canvas {
    max-width: 100%;
    max-height: 100%;
    display: block;
  }

  /* Empty state */
  .empty {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    text-align: center;
    gap: 24px;
  }

  .empty.hidden { display: none; }

  .empty-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.2em;
  }

  .empty-title {
    font-size: 36px;
    font-weight: 300;
    line-height: 1.05;
    letter-spacing: -0.03em;
    max-width: 320px;
  }

  .empty-title em {
    font-style: italic;
    color: var(--accent);
  }

  .empty-sub {
    font-size: 14px;
    color: var(--dim);
    max-width: 280px;
    line-height: 1.5;
  }

  /* Controls */
  .controls {
    padding: 16px 20px 24px;
    border-top: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    gap: 14px;
    background: var(--bg);
  }

  .btn-row {
    display: flex;
    gap: 10px;
  }

  button {
    flex: 1;
    padding: 14px 18px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
    border-radius: 0;
  }

  button:active { transform: scale(0.98); }

  button.primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    font-weight: 600;
  }

  button.primary:active { background: #e64a17; }

  button:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .slider-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .slider-label {
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--dim);
  }

  .slider-label span:last-child {
    color: var(--accent-soft);
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 2px;
    background: var(--line);
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    background: var(--accent);
    cursor: pointer;
    border-radius: 50%;
  }

  input[type="range"]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    background: var(--accent);
    cursor: pointer;
    border: none;
    border-radius: 50%;
  }

  /* Hidden file input */
  #fileInput { display: none; }

  /* Status pill */
  .status {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    padding: 8px 14px;
    border: 1px solid var(--line);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--accent-soft);
    text-transform: uppercase;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  .status.visible { opacity: 1; }

  /* Decorative corners */
  .corner {
    position: absolute;
    width: 12px;
    height: 12px;
    border: 1px solid var(--accent);
    pointer-events: none;
    z-index: 5;
  }
  .corner.tl { top: 12px; left: 12px; border-right: none; border-bottom: none; }
  .corner.tr { top: 12px; right: 12px; border-left: none; border-bottom: none; }
  .corner.bl { bottom: 12px; left: 12px; border-right: none; border-top: none; }
  .corner.br { bottom: 12px; right: 12px; border-left: none; border-top: none; }

  /* Camera modal */
  .cam-modal {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 100;
    display: none;
    flex-direction: column;
  }

  .cam-modal.open { display: flex; }

  #video {
    flex: 1;
    width: 100%;
    object-fit: cover;
  }

  .cam-controls {
    padding: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #000;
  }

  .shutter {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: var(--accent);
    border: 4px solid #fff;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .shutter:active { transform: scale(0.92); }

  .cam-cancel {
    background: none;
    border: none;
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    padding: 14px;
    flex: 0;
  }

  .cam-spacer { width: 70px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">parallax<em>.</em></div>
    <div class="meta">v1 · depth illusion</div>
  </header>

  <div class="stage" id="stage">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="status" id="status">tilt your phone</div>

    <canvas id="canvas"></canvas>

    <div class="empty" id="empty">
      <div class="empty-num">001 / capture</div>
      <h1 class="empty-title">Take a photo, see it <em>breathe</em>.</h1>
      <p class="empty-sub">A single image becomes a parallax scene. Tilt your phone — bright areas push forward, shadows fall back.</p>
    </div>
  </div>

  <div class="controls">
    <div class="slider-row">
      <div class="slider-label">
        <span>depth intensity</span>
        <span id="depthVal">20</span>
      </div>
      <input type="range" id="depthSlider" min="0" max="60" value="20" />
    </div>
    <div class="btn-row">
      <button id="captureBtn" class="primary">Take Photo</button>
      <button id="uploadBtn">Upload</button>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*" />

<!-- Camera modal -->
<div class="cam-modal" id="camModal">
  <video id="video" autoplay playsinline muted></video>
  <div class="cam-controls">
    <button class="cam-cancel" id="camCancel">Cancel</button>
    <button class="shutter" id="shutterBtn"></button>
    <div class="cam-spacer"></div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  const empty = document.getElementById('empty');
  const status = document.getElementById('status');
  const captureBtn = document.getElementById('captureBtn');
  const uploadBtn = document.getElementById('uploadBtn');
  const fileInput = document.getElementById('fileInput');
  const depthSlider = document.getElementById('depthSlider');
  const depthVal = document.getElementById('depthVal');
  const stage = document.getElementById('stage');

  const camModal = document.getElementById('camModal');
  const video = document.getElementById('video');
  const shutterBtn = document.getElementById('shutterBtn');
  const camCancel = document.getElementById('camCancel');

  let imgW = 0, imgH = 0;
  let imageData = null;        // original RGBA
  let depthMap = null;         // grayscale per pixel (0-255)
  let hasImage = false;
  let stream = null;

  // Tilt state
  let tiltX = 0, tiltY = 0;     // current
  let targetX = 0, targetY = 0; // target from sensor or pointer
  let depthScale = 20;

  depthSlider.addEventListener('input', e => {
    depthScale = parseInt(e.target.value, 10);
    depthVal.textContent = depthScale;
  });

  function showStatus(msg, duration = 2000) {
    status.textContent = msg;
    status.classList.add('visible');
    clearTimeout(showStatus._t);
    showStatus._t = setTimeout(() => status.classList.remove('visible'), duration);
  }

  // --- IMAGE LOADING & DEPTH GENERATION ---
  function processImage(img) {
    // Fit to stage while keeping reasonable resolution for performance
    const stageRect = stage.getBoundingClientRect();
    const maxW = Math.min(stageRect.width, 800);
    const maxH = Math.min(stageRect.height, 1000);
    const ratio = Math.min(maxW / img.width, maxH / img.height);
    imgW = Math.floor(img.width * ratio);
    imgH = Math.floor(img.height * ratio);

    canvas.width = imgW;
    canvas.height = imgH;

    ctx.drawImage(img, 0, 0, imgW, imgH);
    imageData = ctx.getImageData(0, 0, imgW, imgH);

    // Generate depth map: combination of luminance + center-bias
    // (no real ML depth available — this is a heuristic that often looks right
    //  because in many photos brighter, more saturated, more central things
    //  are subjects in front and darker corners are background)
    const data = imageData.data;
    depthMap = new Float32Array(imgW * imgH);
    const cx = imgW / 2, cy = imgH / 2;
    const maxDist = Math.sqrt(cx * cx + cy * cy);

    for (let y = 0; y < imgH; y++) {
      for (let x = 0; x < imgW; x++) {
        const i = (y * imgW + x) * 4;
        const r = data[i], g = data[i + 1], b = data[i + 2];
        // Luminance (0-1)
        const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
        // Saturation proxy
        const max = Math.max(r, g, b), min = Math.min(r, g, b);
        const sat = max === 0 ? 0 : (max - min) / max;
        // Center bias (0-1, higher near center)
        const dx = x - cx, dy = y - cy;
        const dist = Math.sqrt(dx * dx + dy * dy) / maxDist;
        const center = 1 - dist;

        // Combined depth: brighter + more saturated + more central = closer
        let depth = lum * 0.5 + sat * 0.2 + center * 0.3;
        depthMap[y * imgW + x] = depth; // 0..1
      }
    }

    // Smooth depth map with simple box blur to avoid jagged artifacts
    smoothDepthMap(3);

    hasImage = true;
    empty.classList.add('hidden');
    captureBtn.textContent = 'New Photo';
    showStatus('tilt your phone', 3000);
    requestMotionPermission();
    requestAnimationFrame(render);
  }

  function smoothDepthMap(radius) {
    const w = imgW, h = imgH;
    const tmp = new Float32Array(w * h);
    // Horizontal pass
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        let sum = 0, count = 0;
        for (let k = -radius; k <= radius; k++) {
          const xi = x + k;
          if (xi >= 0 && xi < w) { sum += depthMap[y * w + xi]; count++; }
        }
        tmp[y * w + x] = sum / count;
      }
    }
    // Vertical pass
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        let sum = 0, count = 0;
        for (let k = -radius; k <= radius; k++) {
          const yi = y + k;
          if (yi >= 0 && yi < h) { sum += tmp[yi * w + x]; count++; }
        }
        depthMap[y * w + x] = sum / count;
      }
    }
  }

  // --- RENDER LOOP: Forward-warping parallax ---
  // Each pixel is shifted by (offset * depth). We render back-to-front
  // (low depth first) so foreground pixels overwrite background.
  function render() {
    if (!hasImage) return;
    requestAnimationFrame(render);

    // Smooth interpolation toward target
    tiltX += (targetX - tiltX) * 0.12;
    tiltY += (targetY - tiltY) * 0.12;

    const shiftX = tiltX * depthScale;
    const shiftY = tiltY * depthScale;

    const src = imageData.data;
    const out = ctx.createImageData(imgW, imgH);
    const dst = out.data;

    // Fill with black
    for (let i = 3; i < dst.length; i += 4) dst[i] = 255;

    // Build sort order by depth (back to front) — we'll use a coarse approach:
    // iterate pixels in order, write with depth-buffer test.
    const zbuf = new Float32Array(imgW * imgH);
    zbuf.fill(-1);

    for (let y = 0; y < imgH; y++) {
      for (let x = 0; x < imgW; x++) {
        const idx = y * imgW + x;
        const d = depthMap[idx]; // 0..1
        const dx = Math.round(shiftX * d);
        const dy = Math.round(shiftY * d);
        const nx = x + dx;
        const ny = y + dy;
        if (nx < 0 || nx >= imgW || ny < 0 || ny >= imgH) continue;
        const ndst = ny * imgW + nx;
        if (d > zbuf[ndst]) {
          zbuf[ndst] = d;
          const si = idx * 4;
          const di = ndst * 4;
          dst[di] = src[si];
          dst[di + 1] = src[si + 1];
          dst[di + 2] = src[si + 2];
          dst[di + 3] = 255;
        }
      }
    }

    // Fill holes with nearest neighbor (simple — copy from src at same position)
    // This hides gaps where pixels stretched apart.
    for (let y = 0; y < imgH; y++) {
      for (let x = 0; x < imgW; x++) {
        const idx = y * imgW + x;
        if (zbuf[idx] < 0) {
          const si = idx * 4;
          const di = idx * 4;
          dst[di] = src[si];
          dst[di + 1] = src[si + 1];
          dst[di + 2] = src[si + 2];
        }
      }
    }

    ctx.putImageData(out, 0, 0);
  }

  // --- INPUT: device orientation + pointer fallback ---
  let orientationActive = false;

  function handleOrientation(e) {
    // gamma: left/right tilt (-90 to 90), beta: front/back (-180 to 180)
    if (e.gamma === null || e.beta === null) return;
    orientationActive = true;
    // Normalize to roughly -1..1
    targetX = Math.max(-1, Math.min(1, -e.gamma / 30));
    targetY = Math.max(-1, Math.min(1, (e.beta - 45) / 30));
  }

  function requestMotionPermission() {
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      // iOS 13+
      DeviceOrientationEvent.requestPermission()
        .then(res => {
          if (res === 'granted') {
            window.addEventListener('deviceorientation', handleOrientation);
          }
        })
        .catch(() => {});
    } else if ('DeviceOrientationEvent' in window) {
      window.addEventListener('deviceorientation', handleOrientation);
    }
  }

  // Pointer fallback (works on desktop and as backup on phone)
  stage.addEventListener('pointermove', e => {
    if (orientationActive) return; // gyro takes priority
    const rect = stage.getBoundingClientRect();
    targetX = ((e.clientX - rect.left) / rect.width - 0.5) * 2;
    targetY = ((e.clientY - rect.top) / rect.height - 0.5) * 2;
  });

  stage.addEventListener('pointerleave', () => {
    if (orientationActive) return;
    targetX = 0;
    targetY = 0;
  });

  // --- CAMERA CAPTURE ---
  async function openCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1920 } },
        audio: false
      });
      video.srcObject = stream;
      camModal.classList.add('open');
    } catch (err) {
      alert('Camera access denied or unavailable. Try the Upload button instead.\n\n(' + err.message + ')');
    }
  }

  function closeCamera() {
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
      stream = null;
    }
    camModal.classList.remove('open');
  }

  function snapPhoto() {
    const w = video.videoWidth, h = video.videoHeight;
    const tmp = document.createElement('canvas');
    tmp.width = w; tmp.height = h;
    tmp.getContext('2d').drawImage(video, 0, 0, w, h);
    const img = new Image();
    img.onload = () => {
      closeCamera();
      processImage(img);
    };
    img.src = tmp.toDataURL('image/jpeg', 0.9);
  }

  captureBtn.addEventListener('click', openCamera);
  shutterBtn.addEventListener('click', snapPhoto);
  camCancel.addEventListener('click', closeCamera);

  uploadBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => processImage(img);
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });

  // Tap stage to request motion permission on iOS
  stage.addEventListener('click', () => {
    if (hasImage) requestMotionPermission();
  });
})();
</script>
</body>
</html>
